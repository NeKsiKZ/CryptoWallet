<div style="font-family: sans-serif; margin: 20px;">
  <h2>Crypto Wallet</h2>
  
  <button (click)="toggleForm()" style="margin-bottom: 15px; cursor: pointer;">
    {{ isFormVisible ? 'Ukryj formularz' : 'Dodaj nową kryptowalutę' }}
  </button>

  @if (isFormVisible) {
    <app-add-asset-form (assetAdded)="onAssetAdded($event)"></app-add-asset-form>
  }

  <app-portfolio-table 
    [groupedAssets]="groupedAssets"
    (delete)="onAssetDeleted($event)"
    (update)="onAssetUpdated($event)">
  </app-portfolio-table>
</div>
