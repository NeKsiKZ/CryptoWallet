<div class="min-h-screen text-slate-200 p-4 md:p-8 font-sans">
  
  <div class="max-w-7xl mx-auto">
    <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <h2 class="text-3xl font-bold text-white tracking-wide">
        Crypto <span class="text-blue-500">Wallet</span>
      </h2>
      
      <button 
        (click)="toggleForm()" 
        class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        {{ isFormVisible ? 'Ukryj formularz' : '+ Nowa Pozycja' }}
      </button>
    </header>

    @if (isFormVisible) {
      <div class="mb-8">
        <app-add-asset-form (assetAdded)="onAssetAdded($event)"></app-add-asset-form>
      </div>
    }

    <app-portfolio-table 
      [groupedAssets]="groupedAssets"
      (delete)="onAssetDeleted($event)"
      (update)="onAssetUpdated($event)">
    </app-portfolio-table>
  </div>

</div>
